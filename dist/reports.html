<!doctype html>
<html lang="en">
  <head>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#7b61ff" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="HISAB" />
    <meta
      name="description"
      content="Complete sales tracking and finance management system"
    />

    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/png" href="./bcgLogo.png" />
    <link rel="apple-touch-icon" href="./bcgLogo.png" />

    <!-- Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .then((reg) => console.log("Service Worker registered"))
            .catch((err) =>
              console.log("Service Worker registration failed:", err),
            );
        });
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fontdiner+Swanky&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/main.css" />
    <script src="details.js"></script>
    <script src="history.js"></script>
  </head>
  <body>
    <div class="reports">
      <div class="topReports">
        <a href="home.html"><i class="fa-solid fa-arrow-left"></i></a>
        <h2>Reports</h2>
        <img class="Logo" src="bcgLogo.png" alt="" />
      </div>
      <hr class="section-divider" />
      <div class="reportBoxes">
        <div class="reportBox"><span>Total Sales</span></div>
        <div class="reportBox"><span>Customers</span></div>
        <div class="reportBox"><span>Growth</span></div>
        <div class="reportBox"><span>Top Product</span></div>
      </div>
      <div class="salesChart"></div>
      <div class="salesByPaymentMethod"></div>
    </div>
    <script src="reports.js"></script>
  </body>
</html>
