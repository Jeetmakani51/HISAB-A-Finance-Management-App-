<!doctype html>
<html lang="en">
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#7b61ff" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />
  <meta name="apple-mobile-web-app-title" content="HISAB" />
  <meta
    name="description"
    content="Complete sales tracking and finance management system"
  />

  <!-- PWA Manifest & Icons -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/png" href="./bcgLogo.png" />
  <link rel="apple-touch-icon" href="./bcgLogo.png" />

  <!-- Service Worker Registration -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("./sw.js")
          .then((reg) => console.log("Service Worker registered"))
          .catch((err) =>
            console.log("Service Worker registration failed:", err),
          );
      });
    }
  </script>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HISAB - Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <div class="loginContainer">
      <div class="loginCard">
        <div class="logoSection">
          <img src="bcgLogo.png" alt="HISAB Logo" class="loginLogo" />
          <h1>HISAB</h1>
          <p>Manage your business with ease</p>
        </div>

        <form class="loginForm" id="loginForm">
          <div class="inputGroup">
            <i class="fa-solid fa-envelope"></i>
            <input
              type="email"
              id="email"
              placeholder="Email Address"
              required
            />
          </div>

          <div class="inputGroup">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />
            <i class="fa-solid fa-eye togglePassword" id="togglePassword"></i>
          </div>

          <div class="rememberMe">
            <label>
              <input type="checkbox" id="rememberMe" />
              <span>Remember Me</span>
            </label>
          </div>

          <button type="submit" class="loginBtn">
            <span>Login</span>
            <i class="fa-solid fa-arrow-right"></i>
          </button>
        </form>

        <div class="errorMessage" id="errorMessage"></div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
