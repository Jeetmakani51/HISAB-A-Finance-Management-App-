<!doctype html>
<html lang="en">
  <head>
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#7b61ff" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="HISAB" />
    <meta
      name="description"
      content="Complete sales tracking and finance management system"
    />

    <!-- PWA Manifest & Icons -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/png" href="./bcgLogo.png" />
    <link rel="apple-touch-icon" href="./bcgLogo.png" />

    <!-- Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .then((reg) => console.log("Service Worker registered"))
            .catch((err) =>
              console.log("Service Worker registration failed:", err),
            );
        });
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <script src="details.js"></script>
    <script src="history.js"></script>
    <title>custInfo</title>
  </head>
  <body>
    <div class="custInfo">
      <div class="custName">Jeet Makani</div>
      <div class="custPhoneNo">+91 98765 43210</div>

      <!-- Payment Summary Section -->
      <div class="paymentSummary">
        <div class="custTotalSpent">Total Spent | <span>₹15700</span></div>
        <div class="custAdvancePayment">Advance Paid | <span>₹0</span></div>
        <div class="custReturnAmount">Return Amount | <span>₹0</span></div>
        <div class="custAmountPending">Pending | <span>₹1200</span></div>
      </div>

      <div class="custHistory">
        <div class="date">Last Order: 12 Oct 2025</div>
        <div class="custItemsBought">
          <!-- Items will be dynamically rendered here -->
        </div>
      </div>
    </div>
    <script src="custinfo.js"></script>
  </body>
</html>
